<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financeiro Escritório - Painel Central</title>
    <style>
        /* Ajustes para preencher a tela do celular corretamente */
        * { box-sizing: border-box; }
        body { 
            font-family: sans-serif; 
            background: #f4f7f6; 
            padding: 15px; /* Reduzi um pouco o padding para ganhar espaço */
            color: #333; 
            margin: 0;
        }
        .card { 
            background: white; 
            padding: 15px; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            margin-bottom: 15px; 
        }
        .saldo-box { 
            background: #27ae60; 
            color: white; 
            text-align: center; 
            padding: 25px 15px; 
            border-radius: 10px; 
        }
        #saldo-valor { margin: 10px 0 0 0; font-size: 2.2rem; }
        
        /* Inputs e Botões maiores para o toque do dedo */
        input, select, button { 
            width: 100%; 
            padding: 12px; /* Aumentei o clique */
            margin-top: 10px; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
            font-size: 16px; /* Impede zoom automático no iPhone */
        }
        button { cursor: pointer; font-weight: bold; border: none; transition: 0.3s; }
        .btn-entrada { background: #27ae60; color: white; height: 50px; }
        .btn-saida { background: #e74c3c; color: white; height: 50px; }
        .btn-qr { background: #2980b9; color: white; margin-top: 20px; }
        
        strong { display: block; margin-bottom: 5px; color: #2c3e50; font-size: 1.1rem; }
        .hist-item { 
            display: flex; 
            justify-content: space-between; 
            padding: 12px 0; /* Mais espaçamento no histórico */
            border-bottom: 1px solid #eee; 
            font-size: 15px; 
        }
        #modal-qr { display: none; text-align: center; margin-top: 15px; padding: 20px; }
        #qrcode-container img { margin: 0 auto; max-width: 100%; height: auto; }
    </style>
</head>
<body>

    <div class="card saldo-box">
        <small>SALDO ATUAL EM CAIXA</small>
        <h1 id="saldo-valor">R$ 0,00</h1>
    </div>

    <div class="card">
        <strong>💰 Lançar Entrada</strong>
        <input type="text" id="desc-entrada" placeholder="Origem (Ex: Cliente)">
        <input type="number" id="valor-entrada" placeholder="Valor (R$)" inputmode="decimal">
        <button class="btn-entrada" onclick="lancar('entrada')">Confirmar Recebimento</button>
    </div>

    <div class="card">
        <strong>💸 Lançar Saída</strong>
        <input type="text" id="desc-saida" placeholder="Destino (Ex: Luz, Água)">
        <input type="number" id="valor-saida" placeholder="Valor (R$)" inputmode="decimal">
        <button class="btn-saida" onclick="lancar('saida')">Confirmar Gasto</button>
    </div>

    <div class="card">
        <label style="font-size: 14px; font-weight: bold;">📅 Filtrar por Mês:</label>
        <select id="filtro-mes" onchange="atualizarDados()">
            <option value="todos">Todos os Meses</option>
            <option value="01">Janeiro</option><option value="02">Fevereiro</option>
            <option value="03">Março</option><option value="04">Abril</option>
            <option value="05">Maio</option><option value="06">Junho</option>
            <option value="07">Julho</option><option value="08">Agosto</option>
            <option value="09">Setembro</option><option value="10">Outubro</option>
            <option value="11">Novembro</option><option value="12">Dezembro</option>
        </select>
        <div id="lista-agrupada" style="margin-top: 15px;"></div>
    </div>

    <button class="btn-qr" onclick="alternarQR()">📲 Mostrar QR Code</button>
    
    <div id="modal-qr" class="card">
        <strong>Acesse pelo Celular</strong>
        <div id="qrcode-container" style="margin: 15px 0; display: flex; justify-content: center;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script>
        const supabaseUrl = 'https://uhddyxmflimxakurztoj.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVoZGR5eG1mbGlteGFrurztojIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2Mjg5NTIsImV4cCI6MjA4ODIwNDk1Mn0.TQJjS9ijbeCzsp0KdyhKgc27ouopZTqII66BLU7dtMg';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        window.onload = function() {
            new QRCode(document.getElementById("qrcode-container"), {
                text: "https://verdinhorp.github.io/financeiro-escritorio/",
                width: 160,
                height: 160
            });
            atualizarDados();
        };

        function alternarQR() {
            const m = document.getElementById('modal-qr');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        }

        async function atualizarDados() {
            const { data, error } = await _supabase.from('movimentacoes').select('*').order('id', { ascending: false });
            if (error) return;

            const filtroMes = document.getElementById('filtro-mes').value;
            let total = 0;
            let html = "";

            data.forEach(m => {
                const mesM = m.data.split('-')[1];
                if (filtroMes === 'todos' || filtroMes === mesM) {
                    total += m.tipo === 'entrada' ? m.valor : -m.valor;
                    html += `
                        <div class="hist-item">
                            <span>${m.descricao}</span>
                            <b style="color:${m.tipo === 'entrada' ? '#27ae60' : '#e74c3c'}">
                                ${m.tipo === 'entrada' ? '+' : '-'} R$ ${m.valor.toFixed(2)}
                            </b>
                        </div>`;
                }
            });

            document.getElementById('saldo-valor').innerText = `R$ ${total.toFixed(2)}`;
            document.getElementById('lista-agrupada').innerHTML = html;
        }

        async function lancar(tipo) {
            const descInput = document.getElementById(tipo === 'entrada' ? 'desc-entrada' : 'desc-saida');
            const valorInput = document.getElementById(tipo === 'entrada' ? 'valor-entrada' : 'valor-saida');

            if (!descInput.value || !valorInput.value) return alert("Preencha os campos!");

            const { error } = await _supabase.from('movimentacoes').insert([{
                descricao: descInput.value.toUpperCase(),
                valor: parseFloat(valorInput.value),
                tipo: tipo,
                data: new Date().toISOString().split('T')[0]
            }]);

            if (error) {
                alert("Erro ao salvar: " + error.message);
            } else {
                descInput.value = ""; 
                valorInput.value = "";
                atualizarDados();
            }
        }

        _supabase.channel('db-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'movimentacoes' }, () => atualizarDados()).subscribe();
    </script>
</body>
</html>
